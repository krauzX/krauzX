<svg viewBox="0 0 1180 610" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Premium Core Gradients -->
        <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" />
            <stop offset="50%" stop-color="#818CF8" />
            <stop offset="100%" stop-color="#34D399" />
            <animate attributeName="x1" values="-100%; 100%" dur="10s" repeatCount="indefinite" />
            <animate attributeName="x2" values="0%; 200%" dur="10s" repeatCount="indefinite" />
        </linearGradient>

        <linearGradient id="cyber-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06B6D4" />
            <stop offset="100%" stop-color="#3B82F6" />
        </linearGradient>

        <linearGradient id="cyber-purple" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#D946EF" />
        </linearGradient>

        <!-- Ambient Depth Filters -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="heavy-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="25" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="shadow">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
        </filter>

        <!-- Advanced ASCII Stream Pattern -->
        <pattern id="ascii-pattern" width="200" height="400" patternUnits="userSpaceOnUse">
            <g font-family="'Fira Code', monospace" font-size="11" font-weight="700" fill="#38BDF8">
                <!-- Staggered scrolling matrix columns -->
                <text x="0" y="0">
                    <tspan x="10" dy="15">01101001</tspan>
                    <tspan x="10" dy="15">impl&lt;T&gt;</tspan>
                    <tspan x="10" dy="15">fn_render</tspan>
                    <tspan x="10" dy="15">mut_state</tspan>
                    <tspan x="10" dy="15">SYS_OK_</tspan>
                    <tspan x="10" dy="15">&amp;lifetime</tspan>
                    <tspan x="10" dy="15">await_</tspan>
                    <tspan x="10" dy="15">01100011</tspan>
                    <tspan x="10" dy="15">MoE_3B_</tspan>
                    <tspan x="10" dy="15">krauzX_</tspan>
                    <animateTransform attributeName="transform" type="translate" values="0,-50; 0,0; 0,-50" dur="4s" repeatCount="indefinite" />
                </text>
                <text x="70" y="-100" fill="#818CF8" opacity="0.8">
                    <tspan x="70" dy="15">=&gt;_ERR</tspan>
                    <tspan x="70" dy="15">101010</tspan>
                    <tspan x="70" dy="15">import</tspan>
                    <tspan x="70" dy="15">*_ptr</tspan>
                    <tspan x="70" dy="15">010101</tspan>
                    <tspan x="70" dy="15">godot_</tspan>
                    <tspan x="70" dy="15">async</tspan>
                    <tspan x="70" dy="15">111000</tspan>
                    <tspan x="70" dy="15">yield_</tspan>
                    <tspan x="70" dy="15">tx_rx_</tspan>
                    <animateTransform attributeName="transform" type="translate" values="0,0; 0,100; 0,0" dur="6s" repeatCount="indefinite" />
                </text>
                <text x="130" y="-50" fill="#34D399" opacity="0.6">
                    <tspan x="130" dy="15">rtx_8g</tspan>
                    <tspan x="130" dy="15">__init</tspan>
                    <tspan x="130" dy="15">001100</tspan>
                    <tspan x="130" dy="15">struct</tspan>
                    <tspan x="130" dy="15">#define</tspan>
                    <tspan x="130" dy="15">010101</tspan>
                    <tspan x="130" dy="15">Vec&lt;u8&gt;</tspan>
                    <tspan x="130" dy="15">alloc_</tspan>
                    <tspan x="130" dy="15">110011</tspan>
                    <tspan x="130" dy="15">0x7FFF</tspan>
                    <animateTransform attributeName="transform" type="translate" values="0,-20; 0,50; 0,-20" dur="3s" repeatCount="indefinite" />
                </text>
            </g>
        </pattern>

        <!-- Anime Character Silhouette Mask -->
        <mask id="anime-mask">
            <!-- Solid white silhouette for the ASCII to shine through -->
            <path d="M120,480 C110,400 90,320 130,240 C140,200 160,150 200,120 C250,80 300,90 340,140 C360,165 370,210 360,260 C350,300 320,330 280,350 L270,390 L320,480 Z" fill="white" />
        </mask>
    </defs>

    <!-- Base Canvas -->
    <rect width="1180" height="610" fill="#020617" rx="16" />
    
    <!-- Cyber Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
    <rect width="1180" height="610" fill="url(#grid)" rx="16" />

    <!-- Ambient Light Fields -->
    <circle cx="250" cy="280" r="250" fill="rgba(6, 182, 212, 0.05)" filter="url(#heavy-glow)" />
    <circle cx="900" cy="400" r="300" fill="rgba(139, 92, 246, 0.04)" filter="url(#heavy-glow)" />

    <!-- ========================================== -->
    <!-- LEFT PANE: ADVANCED ASCII + ANIME ART      -->
    <!-- ========================================== -->
    <g transform="translate(40, 60)">
        
        <!-- The ASCII Materialization (Masked by Anime Profile) -->
        <rect x="50" y="50" width="400" height="500" fill="url(#ascii-pattern)" mask="url(#anime-mask)" opacity="0.85">
            <animate attributeName="opacity" values="0.85; 0.5; 0.85" dur="3s" repeatCount="indefinite" />
        </rect>

        <!-- High-Fidelity Anime Vector Outlines (Cyberpunk Hacker Aesthetic) -->
        <!-- Hair Sweeps -->
        <path d="M200,120 C180,90 140,110 130,140 C120,170 140,200 130,240 C110,210 90,260 110,300 C150,220 170,160 200,120 Z" fill="none" stroke="url(#cyber-cyan)" stroke-width="2" filter="url(#glow)">
            <animate attributeName="stroke-dasharray" values="0,1000; 1000,0" dur="4s" fill="freeze" />
        </path>
        <path d="M200,120 C230,80 290,70 330,110 C370,150 360,200 340,230 C370,200 400,240 360,280 C320,200 280,140 200,120 Z" fill="none" stroke="url(#cyber-purple)" stroke-width="2" filter="url(#glow)">
            <animate attributeName="stroke-dasharray" values="0,1000; 1000,0" dur="4.5s" fill="freeze" />
        </path>

        <!-- Facial Profile & Jawline -->
        <path d="M130,240 C160,270 180,310 200,340 L240,360 L280,350 L270,390" fill="none" stroke="#E2E8F0" stroke-width="1.5" opacity="0.8">
            <animate attributeName="stroke-dasharray" values="0,500; 500,0" dur="3s" fill="freeze" />
        </path>

        <!-- Cybernetic Visor / Anime Eye -->
        <g transform="translate(190, 210)">
            <!-- Glowing Eye Base -->
            <path d="M0,20 L30,0 L70,10 L40,30 Z" fill="rgba(56, 189, 248, 0.15)" stroke="#38BDF8" stroke-width="1.5" filter="url(#glow)" />
            <!-- Inner Pupil / Reticle -->
            <circle cx="35" cy="15" r="4" fill="#fff" filter="url(#glow)">
                <animate attributeName="r" values="4; 6; 4" dur="2s" repeatCount="indefinite" />
                <animate attributeName="fill" values="#fff; #38BDF8; #fff" dur="2s" repeatCount="indefinite" />
            </circle>
            <!-- Cybernetic Tear / Tech line -->
            <path d="M35,22 L35,50 L25,60" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.6" />
        </g>

        <!-- Tech Collar / Neck Interface -->
        <path d="M170,360 L140,420 L240,440 L300,380" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.5" />
        <rect x="180" y="400" width="60" height="10" fill="#34D399" opacity="0.2" filter="url(#glow)">
            <animate attributeName="opacity" values="0.2; 0.6; 0.2" dur="1.5s" repeatCount="indefinite" />
        </rect>

        <!-- Floating Data Particles -->
        <g fill="#38BDF8" font-family="'Fira Code', monospace" font-size="10" opacity="0.7">
            <text x="80" y="150"><animate attributeName="y" values="150; 130; 150" dur="3s" repeatCount="indefinite"/>&lt;/&gt;</text>
            <text x="350" y="120"><animate attributeName="y" values="120; 100; 120" dur="4s" repeatCount="indefinite"/>0xAA</text>
            <text x="100" y="400"><animate attributeName="y" values="400; 420; 400" dur="3.5s" repeatCount="indefinite"/>sys.rs</text>
        </g>
    </g>

    <!-- Vertical Divider -->
    <line x1="460" y1="60" x2="460" y2="550" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4 4" />

    <!-- ========================================== -->
    <!-- RIGHT PANE: PROFESSIONAL DASHBOARD (60%)   -->
    <!-- ========================================== -->
    <g transform="translate(500, 60)" font-family="system-ui, -apple-system, sans-serif">
        
        <!-- Header & Identity -->
        <text font-size="36" font-weight="800" fill="#F8FAFC" letter-spacing="-0.5">Aryan Raja Pandey</text>
        <text x="350" y="-3" font-family="'Fira Code', monospace" font-size="16" font-weight="600" fill="url(#primary-grad)">@krauzX</text>
        
        <text y="30" font-size="16" font-weight="500" fill="#94A3B8">CS Sophomore @ IIIT Kottayam (CGPA: 6.0)</text>
        <text y="55" font-size="15" font-weight="400" fill="#64748B">Architecting High-Performance Systems &amp; Local AI Tooling.</text>

        <!-- Availability Badge -->
        <g transform="translate(0, 75)">
            <rect width="180" height="30" rx="15" fill="rgba(52, 211, 153, 0.1)" stroke="rgba(52, 211, 153, 0.3)" stroke-width="1" />
            <circle cx="20" cy="15" r="4" fill="#34D399">
                <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
            </circle>
            <text x="34" y="20" font-size="12" font-weight="600" fill="#34D399">Open to Remote Roles</text>
        </g>

        <!-- Hardware & Local AI Context -->
        <g transform="translate(195, 75)">
            <rect width="210" height="30" rx="15" fill="rgba(139, 92, 246, 0.1)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1" />
            <path d="M15,10 L25,10 L25,20 L15,20 Z" fill="none" stroke="#A78BFA" stroke-width="1.5"/>
            <text x="35" y="20" font-size="12" font-weight="600" fill="#A78BFA">Local Dev: MoE 3B / RTX 3070</text>
        </g>

        <!-- Tech Stack Pills -->
        <g transform="translate(0, 140)">
            <text font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="1">PRIMARY STACK</text>
            
            <g transform="translate(0, 20)">
                <rect x="0" y="0" width="60" height="26" rx="6" fill="rgba(56, 189, 248, 0.1)" stroke="#38BDF8" stroke-width="1"/>
                <text x="30" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#38BDF8">Go</text>

                <rect x="70" y="0" width="65" height="26" rx="6" fill="rgba(249, 115, 22, 0.1)" stroke="#F97316" stroke-width="1"/>
                <text x="102.5" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#F97316">Rust</text>

                <rect x="145" y="0" width="100" height="26" rx="6" fill="rgba(59, 130, 246, 0.1)" stroke="#3B82F6" stroke-width="1"/>
                <text x="195" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#3B82F6">TypeScript</text>

                <rect x="255" y="0" width="75" height="26" rx="6" fill="rgba(250, 204, 21, 0.1)" stroke="#FACC15" stroke-width="1"/>
                <text x="292.5" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#FACC15">Python</text>

                <rect x="340" y="0" width="105" height="26" rx="6" fill="rgba(236, 72, 153, 0.1)" stroke="#EC4899" stroke-width="1"/>
                <text x="392.5" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#EC4899">Godot 4.7</text>
            </g>
        </g>

        <!-- Architecture & Featured Projects Grid -->
        <text y="210" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="1">FEATURED ARCHITECTURE</text>

        <!-- Project 1: EmojiScript -->
        <g transform="translate(0, 230)" filter="url(#shadow)">
            <rect width="310" height="115" rx="10" fill="#0F172A" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1" />
            <rect width="310" height="115" rx="10" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0">
                <animate attributeName="opacity" values="0; 1; 0" dur="4s" repeatCount="indefinite" />
            </rect>
            <text x="20" y="30" font-size="16" font-weight="700" fill="#F8FAFC">EmojiScript</text>
            <text x="20" y="52" font-size="12" font-weight="400" fill="#94A3B8" line-height="1.4">
                <tspan x="20" dy="0">Custom multi-mode AST transpiler.</tspan>
                <tspan x="20" dy="16">Compiles emoji-based syntax directly</tspan>
                <tspan x="20" dy="16">into executable JavaScript.</tspan>
            </text>
            <text x="20" y="100" font-family="'Fira Code', monospace" font-size="10" font-weight="600" fill="#3B82F6">TypeScript • Language Engine</text>
        </g>

        <!-- Project 2: Expert Ebook Generator -->
        <g transform="translate(330, 230)" filter="url(#shadow)">
            <rect width="310" height="115" rx="10" fill="#0F172A" stroke="rgba(16, 185, 129, 0.4)" stroke-width="1" />
            <rect width="310" height="115" rx="10" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0">
                <animate attributeName="opacity" values="0; 1; 0" dur="4s" begin="1s" repeatCount="indefinite" />
            </rect>
            <text x="20" y="30" font-size="16" font-weight="700" fill="#F8FAFC">Expert Ebook Gen</text>
            <text x="20" y="52" font-size="12" font-weight="400" fill="#94A3B8" line-height="1.4">
                <tspan x="20" dy="0">Multi-agent AI manuscript generation</tspan>
                <tspan x="20" dy="16">system. Orchestrated dynamically using</tspan>
                <tspan x="20" dy="16">local Ollama MoE model fallbacks.</tspan>
            </text>
            <text x="20" y="100" font-family="'Fira Code', monospace" font-size="10" font-weight="600" fill="#10B981">LangGraph • Next.js • Ollama</text>
        </g>

        <!-- Project 3: Algowiz 3D -->
        <g transform="translate(0, 365)" filter="url(#shadow)">
            <rect width="310" height="115" rx="10" fill="#0F172A" stroke="rgba(139, 92, 246, 0.4)" stroke-width="1" />
            <rect width="310" height="115" rx="10" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0">
                <animate attributeName="opacity" values="0; 1; 0" dur="4s" begin="2s" repeatCount="indefinite" />
            </rect>
            <text x="20" y="30" font-size="16" font-weight="700" fill="#F8FAFC">Algowiz 3D Engine</text>
            <text x="20" y="52" font-size="12" font-weight="400" fill="#94A3B8" line-height="1.4">
                <tspan x="20" dy="0">High-performance 3D Data Structure</tspan>
                <tspan x="20" dy="16">and algorithm visualization rendering</tspan>
                <tspan x="20" dy="16">tool for complex graph states.</tspan>
            </text>
            <text x="20" y="100" font-family="'Fira Code', monospace" font-size="10" font-weight="600" fill="#8B5CF6">React Three Fiber • Zustand • Three.js</text>
        </g>

        <!-- Project 4: Blueprint -->
        <g transform="translate(330, 365)" filter="url(#shadow)">
            <rect width="310" height="115" rx="10" fill="#0F172A" stroke="rgba(245, 158, 11, 0.4)" stroke-width="1" />
            <rect width="310" height="115" rx="10" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0">
                <animate attributeName="opacity" values="0; 1; 0" dur="4s" begin="3s" repeatCount="indefinite" />
            </rect>
            <text x="20" y="30" font-size="16" font-weight="700" fill="#F8FAFC">Project BluePrint</text>
            <text x="20" y="52" font-size="12" font-weight="400" fill="#94A3B8" line-height="1.4">
                <tspan x="20" dy="0">AI-powered water and carbon footprint</tspan>
                <tspan x="20" dy="16">tracker application integrating Google's</tspan>
                <tspan x="20" dy="16">Gemini 2.5 Flash. Built in 48 hours.</tspan>
            </text>
            <text x="20" y="100" font-family="'Fira Code', monospace" font-size="10" font-weight="600" fill="#F59E0B">Python • Streamlit • Hackathon</text>
        </g>
    </g>
</svg>
